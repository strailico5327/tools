name: Deploy tools collection to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tools-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare output directory
        run: |
          mkdir -p public
          touch public/.nojekyll
          echo "tools.strailico.me" > public/CNAME

      - name: Checkout Auto Batch Cover Cropper
        uses: actions/checkout@v4
        with:
          repository: strailico5327/auto-batch-cover-cropper
          ref: web
          path: sources/auto-batch-cover-cropper

      - name: Copy Auto Batch Cover Cropper
        run: |
          mkdir -p public/auto-batch-cover-cropper
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            sources/auto-batch-cover-cropper/ public/auto-batch-cover-cropper/

      - name: Checkout Playlist Cover Stitcher
        uses: actions/checkout@v4
        with:
          repository: strailico5327/playlist-cover-stitcher
          ref: web
          path: sources/playlist-cover-stitcher

      - name: Copy Playlist Cover Stitcher
        run: |
          mkdir -p public/playlist-cover-stitcher
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            sources/playlist-cover-stitcher/ public/playlist-cover-stitcher/

      - name: Checkout TTF2WOFF2 Converter
        uses: actions/checkout@v4
        with:
          repository: strailico5327/ttf2woff2-converter
          ref: web
          path: sources/ttf2woff2-converter

      - name: Set up Node.js for TTF2WOFF2 Converter
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sources/ttf2woff2-converter/package-lock.json

      - name: Build TTF2WOFF2 Converter
        working-directory: sources/ttf2woff2-converter
        run: |
          npm ci
          npm run build

      - name: Copy TTF2WOFF2 Converter
        run: |
          mkdir -p public/ttf2woff2-converter
          rsync -a sources/ttf2woff2-converter/dist/ public/ttf2woff2-converter/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4